name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "exp/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "chore/**"

jobs:
  test:
    name: Python tests and baseline smoke run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Problem 1(a) smoke test
        run: python scripts/problem_1a_generate_target_ensemble.py

      - name: Problem 1/2 baseline smoke test
        run: python scripts/run_problem_1_2_baselines.py

      - name: Run pytest
        run: pytest
