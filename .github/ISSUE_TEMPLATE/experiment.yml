name: Experiment
description: Track a reproducible experiment.
title: "[EXP] "
labels: []
body:
  - type: input
    id: owner
    attributes:
      label: Owner
      placeholder: "Example: Jihoo Han"
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: Branch
      placeholder: "Example: exp/problem-3-denoising-extension"
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: State what you expect to improve.
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Include sample size, seed, diffusion steps/time grid, Hamiltonian, measurement basis, and noise model if any.
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: Metrics
      description: Include MMD, Wasserstein, depth, 2-qubit gate count, parameter count, or other relevant metrics.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result
      description: Update this after running the experiment.
